[SystemSetting]
FontType=Arial
FontSize=16
LogPath=./Log/

[ComSetting]
Port=COM20
BaudRate=115200
StopBits=1
DataBits=8
Parity=None
FlowControl=Off

[TCPServer]
IP=0.0.0.0
Port=50000

[TCPClient]
ServerIP=127.0.0.1
ServerPort=50000

[UDPServer]
IP=0.0.0.0
Port=8080

[UDPClient]
ServerIP=127.0.0.1
ServerPort=8080
LocalPort=54321

[ModbusTcpSetting]
ServerIP=127.0.0.1
Port=502
TransactionID=0
ResponseTime=100
ResponseRetry=1
UnitID=1
AutoReconnect=true

[ModbusSetting]
SlaveAddress=1
ResponseTime=250
ResponseRetry=1
ErrorCheck=true

[ModbusComSetting]
Port=COM1
BaudRate=38400
StopBits=1
DataBits=8
Parity=Even
FlowControl=None
